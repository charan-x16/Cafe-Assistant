apiVersion: v1
kind: Secret
metadata:
  name: cafe-assistant-secrets
  namespace: cafe-assistant
type: Opaque
stringData:
  POSTGRES_PASSWORD: replace-me
  DATABASE_URL: postgresql+asyncpg://cafe:replace-me@postgres:5432/cafe_assistant
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: https://replace-me.example.cloud.qdrant.io
  QDRANT_API_KEY: replace-me
  LLM_API_KEY: replace-me
  IDENTITY_PHONE_HASH_SECRET: replace-me
  IDENTITY_OTP_HASH_SECRET: replace-me
  IDENTITY_DEVICE_TOKEN_HASH_SECRET: replace-me
  RATE_LIMIT_HASH_SECRET: replace-me
  OBSERVABILITY_ADMIN_TOKEN: replace-me
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
